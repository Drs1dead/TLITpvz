<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Переход на сайт</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 1rem; }
        p { color: #666; margin-bottom: 2rem; line-height: 1.5; }
        
        .btn {
            display: inline-block;
            text-decoration: none;
            background: #007bff;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Почти готово!</h1>
        <p>Нажмите на кнопку ниже, чтобы перейти на основной сайт Arena.</p>
        <a href="https://019d92fa-babd-757f-9a08-c4c22cd742a0.arena.site/" class="btn">Перейти на сайт</a>
    </div>

</body>
</html>
